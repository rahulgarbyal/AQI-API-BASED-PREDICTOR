name: AQI Fetch Job

on:
  schedule:
    - cron: "0 */6 * * *"   # every 30 minutes
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          WAQI_KEY: ${{ secrets.WAQI_KEY }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: 
          echo "Starting AQI job..."
          python AQI_SCHEDULER.py
          echo "Job finished"
